name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Future-proofing: the tests and demo here only use the HTML sample
      # receipts (no pdftotext needed), but real-world use parses PDF receipts
      # too, so make sure Poppler is installable/available in CI as well.
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Run the documented demo (examples/run_demo.py)
        run: python3 examples/run_demo.py
